<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tickomium Print Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fafafa;
      color: #1a1a1a;
      padding: 24px;
      user-select: none;
    }
    h1 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 12px;
      color: #666;
      margin-bottom: 20px;
    }
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 13px;
      font-weight: 500;
    }
    .status-bar.ok { background: #dcfce7; color: #166534; }
    .status-bar.error { background: #fee2e2; color: #991b1b; }
    .status-bar.loading { background: #f3f4f6; color: #6b7280; }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.green { background: #22c55e; }
    .dot.red { background: #ef4444; }
    .dot.gray { background: #9ca3af; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #374151;
    }
    select, input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      background: white;
      margin-bottom: 16px;
      outline: none;
    }
    select:focus, input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1);
    }
    .btn-row { display: flex; gap: 8px; margin-top: 8px; }
    button {
      flex: 1;
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s;
    }
    button:active { transform: scale(0.98); }
    .btn-primary {
      background: #1a1a1a;
      color: white;
    }
    .btn-primary:hover { background: #333; }
    .btn-secondary {
      background: white;
      color: #374151;
      border-color: #d1d5db;
    }
    .btn-secondary:hover { background: #f9fafb; }
    .btn-test {
      background: white;
      color: #2563eb;
      border-color: #93c5fd;
    }
    .btn-test:hover { background: #eff6ff; }
    .msg {
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      display: none;
    }
    .msg.success { display: block; background: #dcfce7; color: #166534; }
    .msg.error { display: block; background: #fee2e2; color: #991b1b; }
    .footer {
      margin-top: 20px;
      text-align: center;
      font-size: 11px;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <h1>🖨️ Tickomium Print Agent</h1>
  <p class="subtitle">Configura tu impresora térmica</p>

  <div id="statusBar" class="status-bar loading">
    <span class="dot gray" id="statusDot"></span>
    <span id="statusText">Verificando conexión...</span>
  </div>

  <label for="printerSelect">Impresora</label>
  <select id="printerSelect">
    <option value="">Cargando impresoras...</option>
  </select>

  <label for="portInput">Puerto del servidor</label>
  <input type="number" id="portInput" value="6441" min="1024" max="65535">

  <div class="btn-row">
    <button class="btn-primary" id="saveBtn">Guardar</button>
    <button class="btn-test" id="testBtn">Imprimir Prueba</button>
  </div>

  <div id="msg" class="msg"></div>

  <p class="footer">Tickomium Print Agent v1.0.0 — Esta ventana se puede cerrar, la app sigue en la barra de tareas</p>

  <script>
    const api = window.electronAPI || window.api;
    const printerSelect = document.getElementById("printerSelect");
    const portInput = document.getElementById("portInput");
    const saveBtn = document.getElementById("saveBtn");
    const testBtn = document.getElementById("testBtn");
    const statusBar = document.getElementById("statusBar");
    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");
    const msg = document.getElementById("msg");

    function showMsg(text, type) {
      msg.textContent = text;
      msg.className = "msg " + type;
      setTimeout(() => { msg.className = "msg"; }, 4000);
    }

    async function loadConfig() {
      const config = await api.getConfig();
      portInput.value = config.port || 6441;

      const printers = await api.getPrinters();
      printerSelect.innerHTML = '<option value="">-- Selecciona impresora --</option>';
      printers.forEach(p => {
        const opt = document.createElement("option");
        opt.value = p;
        opt.textContent = p;
        if (p === config.printer) opt.selected = true;
        printerSelect.appendChild(opt);
      });

      if (printers.length === 0) {
        printerSelect.innerHTML = '<option value="">No se encontraron impresoras</option>';
      }

      checkHealth();
    }

    async function checkHealth() {
      try {
        const health = await api.getHealth();
        if (health.status === "ok" && health.printer) {
          statusBar.className = "status-bar ok";
          statusDot.className = "dot green";
          statusText.textContent = `Conectado — ${health.printer} (${health.printerStatus})`;
        } else if (health.status === "ok" && !health.printer) {
          statusBar.className = "status-bar loading";
          statusDot.className = "dot gray";
          statusText.textContent = "Servidor activo — Selecciona una impresora";
        } else {
          statusBar.className = "status-bar error";
          statusDot.className = "dot red";
          statusText.textContent = "Error de conexión";
        }
      } catch {
        statusBar.className = "status-bar error";
        statusDot.className = "dot red";
        statusText.textContent = "Servidor no disponible";
      }
    }

    saveBtn.addEventListener("click", async () => {
      const printer = printerSelect.value;
      const port = parseInt(portInput.value) || 6441;
      const result = await api.saveConfig({ printer, port });
      if (result.success) {
        showMsg("Configuración guardada", "success");
        checkHealth();
      } else {
        showMsg("Error al guardar", "error");
      }
    });

    testBtn.addEventListener("click", async () => {
      testBtn.textContent = "Imprimiendo...";
      testBtn.disabled = true;
      const result = await api.testPrint();
      testBtn.textContent = "Imprimir Prueba";
      testBtn.disabled = false;
      if (result.success) {
        showMsg("Prueba de impresión enviada", "success");
      } else {
        showMsg(result.message || "Error al imprimir", "error");
      }
    });

    loadConfig();
    setInterval(checkHealth, 30000);
  </script>
</body>
</html>
